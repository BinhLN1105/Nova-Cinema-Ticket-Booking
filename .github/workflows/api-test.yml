name: 🛡️ Automated API Testing & Bug Reporting

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  # 1. Gọi luồng kiểm thử API xương sống
  call-core-api-test:
    uses: ./.github/workflows/core-api-test.yml
    secrets: inherit # Thừa kế toàn bộ secrets từ repository để chạy test

  # 2. Tự động phân tích và tạo Ticket Bug trên Jira nếu test bị lỗi
  log-jira-bug-on-failure:
    needs: call-core-api-test
    if: failure() # Chỉ chạy khi job call-core-api-test trả về kết quả Failure (có testcase bị lỗi)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Cài đặt thư viện Node.js
        run: npm install axios dotenv

      - name: 📥 Tải kết quả test từ Artifact bộ nhớ tạm
        uses: actions/download-artifact@v4
        with:
          name: postman-report
          path: . # Tải về thư mục hiện tại để script Node.js đọc được (postman-report.json)

      - name: 🐞 Phân tích lỗi & Tự động tạo Bug trên Jira
        env:
          JIRA_DOMAIN: ${{ secrets.JIRA_DOMAIN }}
          JIRA_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_NAME }}
        run: node scripts/auto_log_jira_bug.js
