name: 🦴 Core API Testing Backbone

on:
  workflow_call: # Khai báo để các workflow khác có thể gọi ké

jobs:
  run-core-tests:
    runs-on: ubuntu-latest

    services:
      # ── KHỞI CHẠY POSTGRESQL VỚI PGVECTOR ─────────────────────────────────
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: nova_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # ── KHỞI CHẠY REDIS ĐỂ CACHING ────────────────────────────────────────
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      # ── CHECKOUT MÃ NGUỒN DỰ ÁN ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── THIẾT LẬP MÔI TRƯỜNG JAVA JDK 21 ──────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ── THIẾT LẬP MÔI TRƯỜNG NODE.JS CHO NEWMAN & JIRA SCRIPT ─────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Cài đặt thư viện Node.js & Newman toàn cục
        run: |
          npm install -g newman
          npm install axios dotenv # Cài đặt thư viện cho script Jira nếu cần

      # ── BẮT ĐẦU BIÊN DỊCH DỰ ÁN BACKEND ───────────────────────────────────
      - name: 🔨 Biên dịch dự án Backend Spring Boot
        run: mvn compile -f Backend/ticket-booking/pom.xml

      # ── CHẠY NGẦM BACKEND SPRING BOOT VỚI CÁC THÔNG SỐ ĐỒNG BỘ ─────────────
      - name: 🚀 Chạy ngầm server Spring Boot Backend
        run: |
          nohup mvn spring-boot:run -f Backend/ticket-booking/pom.xml -Dspring-boot.run.profiles=test > spring.log 2>&1 &
          echo "Server Spring Boot đang khởi chạy ngầm..."
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/nova_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: admin
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          JWT_SECRET: mySuperSecretKeyForJWTAuthToken2026PlaceholderSecretKeyJWT
          QR_SECRET: myQrSecretKey2026PlaceholderSecretKeyQR
          INTERNAL_API_KEY: internal_test_secret_key_2026
          VNPAY_TMN_CODE: placeholder_vnpay_code
          VNPAY_HASH_SECRET: ${{ secrets.VNPAY_HASH_SECRET }}
          VNPAY_RETURN_URL: http://localhost:8080/api/v1/payments/vnpay/callback
          CLOUDINARY_NAME: placeholder_cloudinary
          CLOUDINARY_API_KEY: placeholder_cloudinary_key
          CLOUDINARY_API_SECRET: placeholder_cloudinary_secret

      # ── THĂM DÒ TRẠNG THÁI SERVER CHO ĐẾN KHI READY ────────────────────────
      - name: 🔍 Chờ server sẵn sàng (Health Check)
        run: |
          echo "Đang chờ server Spring Boot khởi động..."
          for i in {1..20}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/v1/auth/me || echo "000")
            if [ "$HTTP_STATUS" -eq 401 ] || [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✅ Server đã sẵn sàng phản hồi!"
              exit 0
            fi
            echo "Server chưa sẵn sàng (Status: $HTTP_STATUS). Chờ thêm 5 giây... ($i/20)"
            sleep 5
          done
          echo "❌ Server khởi động quá lâu hoặc bị lỗi! Xem log dưới đây:"
          cat spring.log
          exit 1

      # ── CHẠY BỘ KIỂM THỬ NEWMAN API TEST ──────────────────────────────────
      - name: 🧪 Chạy bộ kiểm thử Newman API Test
        run: |
          mkdir -p baocaoLocal
          newman run qa-tests/postman/NOVATicket.postman_collection.json \
            -e qa-tests/postman/NovaTicket-Local.postman_environment.json \
            --env-var "BaseUrl=http://localhost:8080" \
            --env-var "vnpay_hash_secret=${{ secrets.VNPAY_HASH_SECRET }}" \
            --reporters cli,json \
            --reporter-json-export baocaoLocal/postman-report.json

      # ── UPLOAD KẾT QUẢ TEST JSON LÊN ARTIFACT BỘ NHỚ TẠM ───────────────────
      - name: 💾 Lưu trữ kết quả test tạm thời (Artifact)
        if: always() # Luôn lưu trữ kết quả dù test PASS hay FAIL
        uses: actions/upload-artifact@v4
        with:
          name: postman-report
          path: baocaoLocal/postman-report.json
          retention-days: 2 # Chỉ giữ 2 ngày trên bộ nhớ tạm để tiết kiệm dung lượng
