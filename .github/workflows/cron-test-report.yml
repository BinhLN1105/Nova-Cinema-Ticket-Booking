name: 📅 Weekly API Test Excel Report to Google Drive

on:
  schedule:
    # Chạy tự động vào lúc 01:00 sáng thứ 3 hàng tuần (Giờ UTC là 18:00 Thứ 2)
    - cron: '0 18 * * 1'
  workflow_dispatch: # Cho phép nhấn chạy thủ công ngay trên giao diện web GitHub bất kỳ lúc nào

jobs:
  # 1. Gọi luồng kiểm thử API xương sống
  call-core-api-test:
    uses: ./.github/workflows/core-api-test.yml
    secrets: inherit # Thừa kế toàn bộ secrets từ repository để chạy test

  # 2. Tạo báo cáo Excel và đẩy lên Google Drive (chạy bất kể test PASS hay FAIL)
  upload-excel-report-to-gdrive:
    needs: call-core-api-test
    if: always() # Luôn luôn chạy để xuất báo cáo chất lượng cho PM/QA, bất kể test PASS hay FAIL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Cài đặt thư viện Python cho Excel & Google API
        run: |
          pip install openpyxl google-api-python-client google-auth httplib2 google-auth-httplib2 google-auth-oauthlib python-dotenv

      - name: 📥 Tải kết quả test từ Artifact bộ nhớ tạm
        uses: actions/download-artifact@v4
        with:
          name: postman-report
          path: baocaoLocal # Tải về thư mục baocaoLocal để khớp cấu trúc cho script Python đọc (baocaoLocal/postman-report.json)

      - name: 📊 Xuất báo cáo Excel & Tự động đẩy lên Google Drive
        run: python scripts/generate_test_report.py
        env:
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
