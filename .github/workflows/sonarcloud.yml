name: 🛡️ SonarCloud Analysis

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  # ☕ JOB 1: ANALYZE BACKEND (JAVA MAVEN)
  analyze-backend:
    name: ☕ Analyze Backend
    runs-on: ubuntu-latest

    services:
      # ── POSTGRESQL VỚI PGVECTOR ─────────────────────────────────
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: nova_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # ── REDIS CACHING ────────────────────────────────────────
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Scan Backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/nova_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: admin
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          JWT_SECRET: mySuperSecretKeyForJWTAuthToken2026PlaceholderSecretKeyJWT
          QR_SECRET: myQrSecretKey2026PlaceholderSecretKeyQR
          INTERNAL_API_KEY: internal_test_secret_key_2026
        run: |
          cd Backend/ticket-booking
          mvn clean verify sonar:sonar

      - name: Upload JaCoCo Code Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: Backend/ticket-booking/target/site/jacoco/

      - name: Upload Sonar Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-sonar-report
          path: Backend/ticket-booking/target/sonar/report-task.txt

  # 🤖 JOB 2: ANALYZE ANDROID APP (JAVA GRADLE)
  analyze-android:
    name: 🤖 Analyze Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: |
          cd App
          chmod +x gradlew

      - name: Build & Scan Android
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          cd App
          ./gradlew assembleDebug sonar --no-daemon

      - name: Upload Sonar Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-sonar-report
          path: App/app/build/sonar/report-task.txt

  # ⚛️ JOB 3: ANALYZE FRONTEND (REACT JS/TS)
  analyze-frontend:
    name: ⚛️ Analyze Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan Frontend
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: Frontend/nova-ticketbooking

      - name: Upload Sonar Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-sonar-report
          path: Frontend/nova-ticketbooking/.scannerwork/report-task.txt

  # 🐍 JOB 4: ANALYZE AI SERVICE (FASTAPI PYTHON)
  analyze-ai:
    name: 🐍 Analyze AI Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan AI Service
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: Backend/ai-booking

      - name: Upload Sonar Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-sonar-report
          path: Backend/ai-booking/.scannerwork/report-task.txt

  # 🔄 JOB 5: SYNC SONARCLOUD & JIRA
  sync-jira:
    name: 🔄 Sync Sonar & Jira
    runs-on: ubuntu-latest
    needs: [analyze-backend, analyze-android, analyze-frontend, analyze-ai]
    if: always()
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download Sonar Reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: sonar-reports

      - name: Prepare Reports
        run: |
          mkdir -p Backend/ticket-booking/target/sonar
          mkdir -p App/app/build/sonar
          mkdir -p Frontend/nova-ticketbooking/.scannerwork
          mkdir -p Backend/ai-booking/.scannerwork
          
          if [ -d sonar-reports ]; then
            [ -f sonar-reports/backend-sonar-report/report-task.txt ] && cp sonar-reports/backend-sonar-report/report-task.txt Backend/ticket-booking/target/sonar/
            [ -f sonar-reports/android-sonar-report/report-task.txt ] && cp sonar-reports/android-sonar-report/report-task.txt App/app/build/sonar/
            [ -f sonar-reports/frontend-sonar-report/report-task.txt ] && cp sonar-reports/frontend-sonar-report/report-task.txt Frontend/nova-ticketbooking/.scannerwork/
            [ -f sonar-reports/ai-sonar-report/report-task.txt ] && cp sonar-reports/ai-sonar-report/report-task.txt Backend/ai-booking/.scannerwork/
          fi
          echo "All available report-task files prepared."

      - name: Run Sonar Jira Sync Bot
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_DOMAIN: ${{ secrets.JIRA_DOMAIN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
        run: python scripts/sonar_jira_sync.py

