# KHÔNG CÓ spring.config.import (Không dùng file .env vật lý)

# Logging & Debug (Tắt để tiết kiệm RAM và ổ cứng server)
spring.jpa.show-sql=false
logging.level.com.cinema=INFO
logging.level.org.springframework.security=WARN

# Đóng chặt Swagger API (Chống hacker dò cấu trúc hệ thống)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# URL VNPay (Nếu bạn ký hợp đồng thật với VNPay thì đổi link ở đây, còn làm đồ án thì giữ link Sandbox)
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html

# ── Connection Pool (Tối ưu cho server ít RAM) ────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000

# ── Graceful Shutdown (Đợi request đang xử lý hoàn tất trước khi tắt) ────────
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Hibernate Batching
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true