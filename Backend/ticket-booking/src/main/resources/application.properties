spring.config.import=optional:classpath:.env[.properties]

spring.application.name=ticket-booking
server.port=8080

# CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS}

# Database Configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=${DATABASE_DRIVER_CLASS_NAME}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Custom App Configs ────────────────────────────────────────────────────────
app.frontend.url=${FRONTEND_URL}
app.jwt.secret=${JWT_SECRET}
app.jwt.expiry-minutes=60
app.jwt.refresh-expiry-days=30

app.booking.pending-minutes=10
app.qr.secret=${QR_SECRET}

# Jackson Timezone (Chẩn hóa giờ Việt Nam cho JSON)
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# ── VNPay Sandbox ─────────────────────────────────────────────────────────────
vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=${VNPAY_RETURN_URL}

# ── Scheduler & Logging ───────────────────────────────────────────────────────
spring.scheduling.enabled=true

logging.level.com.cinema=DEBUG
logging.level.org.springframework.security=WARN

# ── Social login ───────────────────────────────────────────────────────────────
app.social.google.client-id=${GOOGLE_CLIENT_ID}
app.social.google.client-secret=${GOOGLE_CLIENT_SECRET}
app.social.facebook.client-id=${FACEBOOK_APP_ID}
app.social.facebook.client-secret=${FACEBOOK_APP_SECRET}


# ── Email ────────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Python RAG server URL
nova.python.rag.url=${PYTHON_RAG_URL}

# Internal API key — phải GIỐNG HỆT bên Python .env: INTERNAL_API_KEY=
nova.internal.api-key=${INTERNAL_API_KEY}

# WebClient timeout (ms)
spring.webflux.client.read-timeout=30000
spring.webflux.client.write-timeout=5000
