# ── Định danh hệ thống ────────────────────────────────────────────────────────
spring.application.name=ticket-booking
server.port=8080

# Mặc định: Nếu không ai ra lệnh gì, ứng dụng sẽ tự chạy ở chế độ DEV
spring.profiles.active=dev

# ── Cấu hình chung không đổi ──────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.scheduling.enabled=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.webflux.client.read-timeout=30000
spring.webflux.client.write-timeout=5000
spring.data.redis.timeout=5000
spring.data.redis.connect-timeout=3000
spring.data.redis.repositories.enabled=false

# ── Hứng Biến Môi Trường (Áp dụng cho mọi Profile) ───────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS}
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=${DATABASE_DRIVER_CLASS_NAME}

app.frontend.url=${FRONTEND_URL}
app.jwt.secret=${JWT_SECRET}
app.jwt.expiry-minutes=60
app.jwt.refresh-expiry-days=30
app.booking.pending-minutes=10
app.qr.secret=${QR_SECRET}

vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}
vnpay.return-url=${VNPAY_RETURN_URL}

app.social.google.client-id=${GOOGLE_CLIENT_ID}
app.social.google.client-secret=${GOOGLE_CLIENT_SECRET}
app.social.facebook.client-id=${FACEBOOK_APP_ID}
app.social.facebook.client-secret=${FACEBOOK_APP_SECRET}

spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}

nova.python.rag.url=${PYTHON_RAG_URL}
nova.internal.api-key=${INTERNAL_API_KEY}

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

firebase.credential.path=${FIREBASE_CREDENTIAL_PATH}

cloudinary.cloud-name=${CLOUDINARY_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRECT}

# ── Flyway Migration ────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration