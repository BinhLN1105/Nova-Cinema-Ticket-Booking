# ── Định danh hệ thống ────────────────────────────────────────────────────────
spring.application.name=ticket-booking
server.port=8080

# Mặc định: Nếu không ai ra lệnh gì, ứng dụng sẽ tự chạy ở chế độ DEV
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ── Cấu hình chung không đổi ──────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.scheduling.enabled=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.webflux.client.read-timeout=30000
spring.webflux.client.write-timeout=5000
spring.data.redis.timeout=5000
spring.data.redis.connect-timeout=3000
spring.data.redis.repositories.enabled=false

# ── Hứng Biến Môi Trường (Áp dụng cho mọi Profile) ───────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:*}
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/nova_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=${DATABASE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.hikari.data-source-properties.reWriteBatchedInserts=true

app.frontend.url=${FRONTEND_URL:https://localhost:5173}
app.jwt.secret=${JWT_SECRET}
app.jwt.expiry-minutes=60
app.jwt.refresh-expiry-days=30
app.booking.pending-minutes=10
app.qr.secret=${QR_SECRET}

vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}
vnpay.return-url=${VNPAY_RETURN_URL}

app.social.google.client-id=${GOOGLE_CLIENT_ID:placeholder}
app.social.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder}
app.social.facebook.client-id=${FACEBOOK_APP_ID:placeholder}
app.social.facebook.client-secret=${FACEBOOK_APP_SECRET:placeholder}

spring.mail.username=${EMAIL_USERNAME:placeholder}
spring.mail.password=${EMAIL_PASSWORD:placeholder}

nova.python.rag.url=${PYTHON_RAG_URL:http://novaticket-ai}
nova.internal.api-key=${INTERNAL_API_KEY}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:novaRedis2026}

firebase.credential.path=${FIREBASE_CREDENTIAL_PATH:novaTicket-serviceAccountKey.json}

cloudinary.cloud-name=${CLOUDINARY_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRECT}

# ── Flyway Migration ────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:/db/migration
# Tắt chế độ lock transactional để tương thích với Supabase Pooler
spring.flyway.postgresql.transactional.lock=false